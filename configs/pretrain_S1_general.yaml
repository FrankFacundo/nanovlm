    weight: 0.10
    format: parquet
    glob: "text-pretrain/fineweb2_eng/*.parquet"
  - name: stack_edu
    weight: 0.10
    format: parquet
    glob: "code-pretrain/stack_edu/*.parquet"
  - name: pes2o
    weight: 0.05
    format: parquet
    glob: "text-pretrain/pes2o/*.parquet"
